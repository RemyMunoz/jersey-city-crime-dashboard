<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ward Detail | BlockIQ JC</title>
  <meta name="description" content="Ward-level neighborhood detail for Jersey City with BlockIQ JC safety score context, verified nearby schools, parks, and transit, plus clear source notes about what ward-level crime data is available.">
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0c10;
      --panel: #111318;
      --panel-soft: rgba(17, 19, 24, 0.9);
      --border: #1e2229;
      --text: #e8eaed;
      --muted: #6b7280;
      --accent: #e8571a;
      --accent-soft: rgba(232, 87, 26, 0.16);
      --blue: #4a90d9;
      --green: #4ade80;
      --yellow: #facc15;
      --orange: #fb923c;
      --red: #ef4444;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: radial-gradient(circle at top, rgba(74, 144, 217, 0.12), transparent 32%), var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }
    body { min-height: 100vh; }
    a { color: inherit; }

    .page-shell {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 24px 56px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      margin-bottom: 26px;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(10, 12, 16, 0.85);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .brand-mark {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 2px;
      line-height: 1;
    }

    .brand-mark .iq { color: var(--accent); }
    .brand-sub {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .top-links {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .ghost-link,
    .primary-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 999px;
      border: 1px solid var(--border);
      text-decoration: none;
      font-size: 0.86rem;
      transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }

    .ghost-link {
      background: rgba(255, 255, 255, 0.02);
      color: var(--muted);
    }

    .ghost-link:hover {
      transform: translateY(-1px);
      color: var(--text);
      border-color: rgba(74, 144, 217, 0.45);
    }

    .primary-link {
      background: var(--accent-soft);
      border-color: rgba(232, 87, 26, 0.4);
      color: #ffd8c9;
    }

    .primary-link:hover {
      transform: translateY(-1px);
      background: rgba(232, 87, 26, 0.22);
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.3fr) minmax(320px, 0.7fr);
      gap: 22px;
      margin-bottom: 22px;
    }

    .hero-card,
    .panel,
    .metric-card,
    .crime-table-wrap,
    .sources-card,
    .empty-state {
      border: 1px solid var(--border);
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(17, 19, 24, 0.96), rgba(10, 12, 16, 0.98));
      box-shadow: var(--shadow);
    }

    .hero-card {
      position: relative;
      overflow: hidden;
      padding: 32px;
    }

    .hero-card::after {
      content: '';
      position: absolute;
      inset: auto -12% -38% auto;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(232, 87, 26, 0.18), rgba(232, 87, 26, 0));
      pointer-events: none;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 30px;
      padding: 0 12px;
      margin-bottom: 18px;
      border: 1px solid rgba(232, 87, 26, 0.3);
      border-radius: 999px;
      background: rgba(232, 87, 26, 0.08);
      color: #ffbb9e;
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .hero h1 {
      margin: 0;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 7vw, 5.6rem);
      line-height: 0.94;
      letter-spacing: 1px;
    }

    .hero h1 span { color: var(--accent); }

    .hero-copy {
      max-width: 620px;
      margin: 16px 0 0;
      color: #c4cad2;
      font-size: 1rem;
      line-height: 1.75;
    }

    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 20px;
    }

    .meta-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 36px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(255, 255, 255, 0.03);
      color: var(--muted);
      font-size: 0.84rem;
    }

    .score-panel {
      padding: 28px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 18px;
    }

    .score-ring {
      --score: 50;
      --ring-color: var(--orange);
      width: 178px;
      height: 178px;
      margin: 0 auto;
      border-radius: 50%;
      background: conic-gradient(var(--ring-color) calc(var(--score) * 1%), rgba(255, 255, 255, 0.08) 0);
      display: grid;
      place-items: center;
      position: relative;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.04) inset;
    }

    .score-ring::before {
      content: '';
      position: absolute;
      inset: 12px;
      border-radius: 50%;
      background: linear-gradient(180deg, rgba(17, 19, 24, 0.95), rgba(10, 12, 16, 0.98));
      border: 1px solid rgba(255,255,255,0.05);
    }

    .score-ring-inner {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .score-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 4rem;
      line-height: 0.9;
      letter-spacing: 1px;
    }

    .score-label {
      margin-top: 6px;
      font-family: 'Space Mono', monospace;
      font-size: 0.78rem;
      letter-spacing: 1.6px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .score-tier {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      font-family: 'Space Mono', monospace;
      font-size: 0.76rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #111;
      font-weight: 700;
      margin: 0 auto;
    }

    .score-summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 6px;
    }

    .summary-card {
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.03);
    }

    .summary-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .summary-value {
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.3;
    }

    .summary-note {
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.5;
    }

    .content-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(320px, 0.95fr);
      gap: 22px;
      align-items: start;
    }

    .panel {
      padding: 26px;
    }

    .section-kicker {
      font-family: 'Space Mono', monospace;
      font-size: 0.76rem;
      letter-spacing: 2px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .section-title {
      margin: 0 0 12px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.3rem;
      letter-spacing: 1px;
      line-height: 1;
    }

    .section-copy {
      margin: 0 0 18px;
      color: #c4cad2;
      line-height: 1.75;
      font-size: 0.96rem;
    }

    .method-note {
      margin: 14px 0 0;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(74, 144, 217, 0.08);
      border: 1px solid rgba(74, 144, 217, 0.18);
      color: #c9d8eb;
      font-size: 0.85rem;
      line-height: 1.7;
    }

    .crime-table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .crime-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.94rem;
      min-width: 360px;
    }

    .crime-table th,
    .crime-table td {
      padding: 13px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      text-align: left;
    }

    .crime-table th {
      background: rgba(255, 255, 255, 0.03);
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 1.4px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .crime-table td:last-child,
    .crime-table th:last-child { text-align: right; }

    .crime-table tr.signal-row td:first-child {
      color: #ffd6c7;
      font-weight: 700;
    }

    .signal-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 22px;
      padding: 0 8px;
      margin-left: 8px;
      border-radius: 999px;
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: rgba(232, 87, 26, 0.14);
      color: #ffbb9e;
      border: 1px solid rgba(232, 87, 26, 0.28);
      vertical-align: middle;
    }

    .crime-count {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      color: #f7f8fa;
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .metric-card {
      padding: 18px;
      background: linear-gradient(180deg, rgba(17, 19, 24, 0.95), rgba(13, 15, 20, 0.98));
    }

    .metric-card h3 {
      margin: 0 0 10px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.55rem;
      letter-spacing: 1px;
    }

    .metric-value {
      font-family: 'Space Mono', monospace;
      font-size: 1.3rem;
      font-weight: 700;
      color: #f7f8fa;
      margin-bottom: 6px;
    }

    .metric-caption {
      color: #c4cad2;
      font-size: 0.9rem;
      line-height: 1.65;
      margin: 0;
    }

    .detail-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 12px;
    }

    .detail-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.6;
    }

    .detail-item::before {
      content: '•';
      color: var(--accent);
      font-size: 1rem;
      line-height: 1.2;
      margin-top: 1px;
    }

    .sources-card {
      margin-top: 22px;
      padding: 18px 22px;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.8;
    }

    .sources-card a {
      color: #8fb8d3;
      text-decoration: none;
    }

    .sources-card a:hover { text-decoration: underline; }

    .empty-state {
      padding: 34px;
      text-align: center;
    }

    .empty-state h1 {
      margin: 0 0 10px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.8rem;
      letter-spacing: 1px;
    }

    .empty-state p {
      max-width: 560px;
      margin: 0 auto 18px;
      color: #c4cad2;
      line-height: 1.75;
    }

    @media (max-width: 1024px) {
      .hero,
      .content-grid {
        grid-template-columns: 1fr;
      }

      .score-summary,
      .metrics-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      .page-shell {
        padding: calc(18px + env(safe-area-inset-top, 0px)) 16px calc(42px + env(safe-area-inset-bottom, 0px));
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .top-links {
        width: 100%;
      }

      .ghost-link,
      .primary-link {
        flex: 1 1 100%;
        min-height: 44px;
      }

      .hero-card,
      .score-panel,
      .panel {
        padding: 22px;
      }

      .hero h1 {
        font-size: clamp(2.7rem, 14vw, 4rem);
      }

      .hero-meta {
        flex-direction: column;
      }

      .meta-chip {
        width: 100%;
        justify-content: flex-start;
        min-height: 44px;
      }

      .score-ring {
        width: 156px;
        height: 156px;
      }
    }

    @media (max-width: 480px) {
      .hero-copy,
      .section-copy,
      .metric-caption,
      .detail-item,
      .sources-card {
        font-size: 0.88rem;
      }

      .top-links {
        width: 100%;
      }

      .ghost-link,
      .primary-link {
        flex: 1 1 auto;
      }
    }
  </style>
<script>
(function(){
  var BIQJC_SESSION_KEY = 'biqjc_session_auth_ok';
  var BIQJC_PASSWORD = 'jcimpact1213';
  var h = (location.hostname || '').toLowerCase();
  var isLocal = h === 'localhost' || h === '127.0.0.1' || h === '[::1]';

  var authed = isLocal;
  try{
    authed = authed || String(sessionStorage.getItem(BIQJC_SESSION_KEY)) === '1';
  }catch(e){}

  window.__biqjcGateAuthed = authed;
  if(authed) return;

  function mountGate(){
    if(document.getElementById('biqjc-gate-overlay')) return;

    var styleEl = document.getElementById('biqjc-gate-style');
    if(!styleEl){
      styleEl = document.createElement('style');
      styleEl.id = 'biqjc-gate-style';
      styleEl.textContent = "\
#biqjc-gate-overlay{position:fixed;inset:0;z-index:999999;background:rgba(0,0,0,0.72);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;padding:24px;}\
#biqjc-gate-shell{width:min(560px,100%);background:rgba(10,12,16,0.92);border:1px solid rgba(201,168,76,0.22);border-radius:20px;box-shadow:0 24px 80px rgba(0,0,0,0.45);padding:28px 24px;color:#e8eaed;text-align:center;}\
#biqjc-gate-title{font-size:1.7rem;font-weight:800;letter-spacing:0.02em;margin:0 0 10px;}\
#biqjc-gate-subtitle{margin:0 auto 18px;max-width:40rem;color:rgba(232,234,237,0.78);line-height:1.5;font-size:1rem;}\
#biqjc-gate-form{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}\
#biqjc-gate-input{flex:1 1 260px;background:rgba(255,255,255,0.06);border:1px solid rgba(244,247,251,0.18);color:#e8eaed;border-radius:12px;padding:12px 14px;font-size:1rem;outline:none;}\
#biqjc-gate-input:focus{border-color:rgba(232,87,26,0.7);box-shadow:0 0 0 3px rgba(232,87,26,0.18);}\
#biqjc-gate-btn{background:linear-gradient(90deg, rgba(232,87,26,0.85), rgba(201,168,76,0.35));border:1px solid rgba(232,87,26,0.55);color:#ffd8c9;border-radius:12px;padding:12px 18px;font-weight:800;cursor:pointer;}\
#biqjc-gate-btn:active{transform:translateY(1px);}\
#biqjc-gate-error{margin-top:12px;min-height:1.2em;color:#fca5a5;font-size:0.92rem;}\
";
      document.head.appendChild(styleEl);
    }

    var overlay = document.createElement('div');
    overlay.id = 'biqjc-gate-overlay';
    overlay.setAttribute('role', 'dialog');
    overlay.setAttribute('aria-modal', 'true');

    overlay.innerHTML = "\
      <div id='biqjc-gate-shell'>\
        <div id='biqjc-gate-title'>Access restricted</div>\
        <p id='biqjc-gate-subtitle'>Enter the password to view this page. This access lasts for this browser session.</p>\
        <form id='biqjc-gate-form'>\
          <input id='biqjc-gate-input' type='password' autocomplete='current-password' placeholder='Password' aria-label='Password'/>\
          <button id='biqjc-gate-btn' type='submit'>Unlock</button>\
        </form>\
        <div id='biqjc-gate-error' aria-live='polite'></div>\
      </div>";

    document.body.appendChild(overlay);

    try{ overlay.querySelector('#biqjc-gate-input').focus(); }catch(e){}

    var form = overlay.querySelector('#biqjc-gate-form');
    var input = overlay.querySelector('#biqjc-gate-input');
    var err = overlay.querySelector('#biqjc-gate-error');

    form.addEventListener('submit', function(ev){
      ev.preventDefault();
      var v = String(input.value || '');
      if(v === BIQJC_PASSWORD){
        try{ sessionStorage.setItem(BIQJC_SESSION_KEY, '1'); }catch(e){}
        window.__biqjcGateAuthed = true;
        window.location.reload();
        return;
      }
      err.textContent = 'Incorrect password.';
      try{ input.select(); }catch(e){}
    });
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', mountGate);
  }else{
    mountGate();
  }
})();
</script>

        libraries: 2,
        affordableHousing: 12
      }
    };

    function escapeHTML(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function formatNumber(value) {
      return Number(value || 0).toLocaleString();
    }

    function getWardFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const ward = String(params.get('ward') || window.location.hash.replace('#', '') || '').trim().toUpperCase();
      return WARD_PROFILES[ward] ? ward : null;
    }

    function renderWardPage(profile) {
      const pageShell = document.getElementById('pageShell');
      const title = `${profile.name} — ${profile.neighborhood} | BlockIQ JC`;
      document.title = title;

      pageShell.innerHTML = `
        <header class="topbar">
          <div class="brand">
            <div class="brand-mark">BLOCK<span class="iq">IQ</span> JC</div>
            <div class="brand-sub">Ward intelligence profile</div>
          </div>
          <div class="top-links">
            <a class="ghost-link" href="index.html">← Back to Home</a>
            <a class="primary-link" href="dashboard.html">Back to Dashboard</a>
          </div>
        </header>

        <section class="hero">
          <article class="hero-card">
            <div class="eyebrow">Ward detail page · Jersey City</div>
            <h1>${escapeHTML(profile.name)} <span>— ${escapeHTML(profile.neighborhood)}</span></h1>
            <p class="hero-copy">This page shows the current BlockIQ ward safety context plus verified nearby schools, parks, libraries, housing, and transit. Official 2025 JCPD crime totals are citywide only, so this page does not assign 2025 incidents to individual wards.</p>
            <div class="hero-meta">
              <div class="meta-chip"><strong>${formatNumber(profile.incidents)}</strong>&nbsp;verified 2024 ward incidents</div>
              <div class="meta-chip"><strong>${escapeHTML(profile.topCrime)}</strong>&nbsp;top reported 2024 category</div>
              <div class="meta-chip"><strong>${escapeHTML(profile.council)}</strong>&nbsp;council representative</div>
            </div>
          </article>

          <aside class="score-panel hero-card">
            <div class="score-ring" style="--score:${profile.score}; --ring-color:${profile.scoreColor};">
              <div class="score-ring-inner">
                <div class="score-value">${profile.score}</div>
                <div class="score-label">Safety Score</div>
              </div>
            </div>
            <div class="score-tier" style="background:${profile.scoreColor};">${escapeHTML(profile.tierLabel)}</div>
            <div class="score-summary">
              <div class="summary-card">
                <div class="summary-label">Top 2024 Category</div>
                <div class="summary-value">${escapeHTML(profile.topCrime)}</div>
                <div class="summary-note">Highest reported category in the verified 2024 ward dataset.</div>
              </div>
              <div class="summary-card">
                <div class="summary-label">2024 Incidents</div>
                <div class="summary-value">${formatNumber(profile.incidents)}</div>
                <div class="summary-note">Ward-level total already used throughout the current dashboard.</div>
              </div>
              <div class="summary-card">
                <div class="summary-label">Schools</div>
                <div class="summary-value">${formatNumber(profile.schools)}</div>
                <div class="summary-note">Schools and daycares currently mapped in this ward.</div>
              </div>
            </div>
          </aside>
        </section>

        <section class="content-grid">
          <div class="panel">
            <div class="section-kicker">Crime data availability</div>
            <h2 class="section-title">Only Verified Ward Data</h2>
            <p class="section-copy">Ward-level incident locations for 2025 are not published in the official JCPD release. Because of that, BlockIQ does not estimate or assign 2025 crimes to this ward.</p>
            <div class="metrics-grid">
              <article class="metric-card">
                <h3>Verified 2024 Ward Total</h3>
                <div class="metric-value">${formatNumber(profile.incidents)}</div>
                <p class="metric-caption">Published ward-level incident total currently used in the dashboard’s ward score context.</p>
              </article>

              <article class="metric-card">
                <h3>Top 2024 Reported Category</h3>
                <div class="metric-value">${escapeHTML(profile.topCrime)}</div>
                <p class="metric-caption">Highest reported category in the ward-level dataset already shown across the dashboard.</p>
              </article>

              <article class="metric-card">
                <h3>2025 JCPD Crime Data</h3>
                <div class="metric-value">Citywide only</div>
                <p class="metric-caption">JCPD’s 2025 NIBRS release is public, but it is not broken out by ward or incident location on this page.</p>
                <div class="detail-list">
                  <div class="detail-item"><a href="https://cdnsm5-hosted.civiclive.com/UserFiles/Servers/Server_6189660/File/City%20Hall/Public%20Safety/UCR%20Crime%20Data%20Report/2025-JCPD-Crime-Stats.png" target="_blank" rel="noopener noreferrer">View official 2025 citywide JCPD stats</a></div>
                </div>
              </article>

              <article class="metric-card">
                <h3>Current BlockIQ Score</h3>
                <div class="metric-value">${profile.score} · ${escapeHTML(profile.tierLabel)}</div>
                <p class="metric-caption">This is the same safety score already shown on the dashboard for comparing wards and districts.</p>
              </article>
            </div>
            <div class="method-note">BlockIQ will only show ward-level incident counts when official ward-level or geocoded incident data is available.</div>
          </div>

          <div class="panel">
            <div class="section-kicker">Nearby essentials</div>
            <h2 class="section-title">Key Stats Around ${escapeHTML(profile.neighborhood)}</h2>
            <div class="metrics-grid">
              <article class="metric-card">
                <h3>Schools &amp; Daycares</h3>
                <div class="metric-value">${formatNumber(profile.schools)}</div>
                <p class="metric-caption">Current school and daycare locations already mapped inside this ward.</p>
                <div class="detail-list">
                  ${profile.schoolExamples.map((item) => `<div class="detail-item">${escapeHTML(item)}</div>`).join('')}
                </div>
              </article>

              <article class="metric-card">
                <h3>Parks &amp; Green Space</h3>
                <div class="metric-value">${formatNumber(profile.parks)}</div>
                <p class="metric-caption">Verified parks and green-space locations from the current BlockIQ ward map.</p>
                <div class="detail-list">
                  ${profile.parkExamples.map((item) => `<div class="detail-item">${escapeHTML(item)}</div>`).join('')}
                </div>
              </article>

              <article class="metric-card">
                <h3>Transit Nearby</h3>
                <div class="metric-value">${escapeHTML(profile.transit)}</div>
                <p class="metric-caption">${escapeHTML(profile.transitDetail)}</p>
                <div class="detail-list">
                  <div class="detail-item">Ward detail pages stay linked back to the full dashboard map for route-level context.</div>
                </div>
              </article>

              <article class="metric-card">
                <h3>Community Snapshot</h3>
                <div class="metric-value">${formatNumber(profile.libraries)} libraries · ${formatNumber(profile.affordableHousing)} housing sites</div>
                <p class="metric-caption">Additional ward-level counts derived from the same verified BlockIQ community layers already active in the dashboard.</p>
                <div class="detail-list">
                  <div class="detail-item">Council member: ${escapeHTML(profile.council)}</div>
                  <div class="detail-item">Current score tier: ${escapeHTML(profile.tierLabel)}</div>
                </div>
              </article>
            </div>
          </div>
        </section>

        <section class="sources-card">
          Source set: verified ward-level data already published in the dashboard + verified community layers already active in BlockIQ. Official 2025 JCPD source: <a href="https://cdnsm5-hosted.civiclive.com/UserFiles/Servers/Server_6189660/File/City%20Hall/Public%20Safety/UCR%20Crime%20Data%20Report/2025-JCPD-Crime-Stats.png" target="_blank" rel="noopener noreferrer">JCPD Crime Stats 2025</a>. No 2025 ward-level incident breakdown is shown unless official ward-level or geocoded data exists.
        </section>
      `;
    }

    function renderInvalidState() {
      document.title = 'Ward Detail | BlockIQ JC';
      document.getElementById('pageShell').innerHTML = `
        <div class="empty-state">
          <h1>Ward not found</h1>
          <p>Use one of the BlockIQ ward links from the landing page or dashboard, or jump back to the main dashboard and choose a ward from there.</p>
          <div class="top-links" style="justify-content:center;">
            <a class="ghost-link" href="index.html">Back to Home</a>
            <a class="primary-link" href="dashboard.html">Back to Dashboard</a>
          </div>
        </div>
      `;
    }

    if(window.__biqjcGateAuthed){
      const wardId = getWardFromUrl();
      if (wardId) {
        renderWardPage(WARD_PROFILES[wardId]);
      } else {
        renderInvalidState();
      }
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scheduled Maintenance</title>
  <meta name="description" content="This site is currently undergoing scheduled maintenance. Check back soon.">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <link rel="icon" href="data:,">
  <style>
    :root {
      --navy: #1F3864;
      --gold: #C9A84C;
      --bg: #09101d;
      --panel: rgba(31, 56, 100, 0.22);
      --panel-border: rgba(201, 168, 76, 0.26);
      --text: #f4f7fb;
      --muted: rgba(244, 247, 251, 0.72);
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(201, 168, 76, 0.14), transparent 28%),
        radial-gradient(circle at bottom right, rgba(31, 56, 100, 0.48), transparent 34%),
        var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .maintenance-shell {
      width: min(640px, 100%);
      padding: 40px 34px;
      border: 1px solid var(--panel-border);
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(31, 56, 100, 0.26), rgba(31, 56, 100, 0.12));
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      text-align: center;
    }

    .accent-line {
      width: 72px;
      height: 4px;
      margin: 0 auto 24px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--gold), rgba(201, 168, 76, 0.35));
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(2rem, 5vw, 2.8rem);
      line-height: 1.1;
      letter-spacing: 0.02em;
      color: var(--text);
      font-weight: 700;
    }

    p {
      margin: 0 auto;
      max-width: 36rem;
      font-size: 1.05rem;
      line-height: 1.7;
      color: var(--muted);
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 26px;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(9, 16, 29, 0.58);
      border: 1px solid rgba(201, 168, 76, 0.22);
      color: var(--gold);
      font-size: 0.82rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 16px rgba(201, 168, 76, 0.55);
    }
  </style>
</head>
<body>
  <main class="maintenance-shell">
    <div class="accent-line"></div>
    <h1>Scheduled Maintenance</h1>
    <p>This site is currently undergoing scheduled maintenance. Check back soon.</p>
    <div class="status-pill">
      <span class="status-dot"></span>
      Maintenance in progress
    </div>
  </main>
</body>
</html>
